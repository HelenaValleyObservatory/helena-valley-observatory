# ═══════════════════════════════════════════════════════════════
# HELENA VALLEY OBSERVATORY — Configuration
# Edit these values for your own installation
# ═══════════════════════════════════════════════════════════════

[observatory]
# Root directory where data will be stored
data_root = /your/data/path/here

# Your receiver location (decimal degrees)
receiver_lat = 46.5890
receiver_lon = -112.0391

# Local airport/reference point
airport_lat  = 46.5890
airport_lon  = -112.0391
airport_name = KHLN
field_elev_ft = 3877

# Valley axis for terrain channeling analysis (degrees, ENE direction)
# Helena Basin: 75.0  — change for your local terrain
valley_axis_deg = 75.0

[readsb]
# Path to readsb aircraft.json output
aircraft_json = /run/readsb/aircraft.json

# Poll interval for logger (seconds)
poll_interval = 5
